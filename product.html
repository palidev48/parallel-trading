<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARALLEL - Product</title>
<link rel="stylesheet" href="/css/parallel.css">
<style>
  .pd-wrap{max-width:1200px;margin:0 auto;padding:80px 40px;display:grid;grid-template-columns:1fr 1fr;gap:64px}
  .pd-image{background:radial-gradient(ellipse at center,#1a1a1a 0%,#0a0a0a 100%);padding:40px;display:flex;align-items:center;justify-content:center;min-height:500px;border:1px solid #1f1f1f}
  .pd-image img{max-width:100%;max-height:480px;object-fit:contain;filter:drop-shadow(0 12px 24px rgba(0,0,0,0.5))}
  .pd-info h1{font-family:var(--serif);font-size:36px;font-weight:400;line-height:1.2;margin-bottom:16px}
  .pd-tag{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--gold);margin-bottom:24px}
  .pd-price-row{display:flex;align-items:baseline;gap:16px;margin:24px 0 32px;padding-bottom:24px;border-bottom:1px solid #1f1f1f}
  .pd-price{font-family:var(--sans);font-size:36px;font-weight:600}
  .pd-market{font-size:14px;color:var(--text-3);text-decoration:line-through}
  .pd-savings{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--pk-red);padding:4px 8px;border:1px solid var(--pk-red);border-radius:2px}
  .pd-desc{font-size:15px;line-height:1.7;color:var(--text-2);margin-bottom:32px}
  .pd-contents{margin-bottom:32px}
  .pd-contents h3{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--text-2);margin-bottom:12px}
  .pd-contents ul{list-style:none;padding:0}
  .pd-contents li{padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:14px;color:var(--text-2)}
  .pd-contents li:before{content:'—';color:var(--pk-red);margin-right:12px}
  .pd-qty{display:flex;align-items:center;gap:16px;margin-bottom:24px}
  .pd-qty label{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--text-2)}
  .pd-qty-control{display:inline-flex;align-items:center;border:1px solid #2a2a2a}
  .pd-qty-control button{background:transparent;border:none;color:#fff;width:40px;height:40px;font-size:18px;cursor:pointer}
  .pd-qty-control button:hover{background:#1a1a1a}
  .pd-qty-control input{background:transparent;border:none;color:#fff;width:48px;height:40px;text-align:center;font-family:var(--sans);font-size:14px}
  .pd-actions{display:flex;gap:12px}
  .pd-add{flex:1;background:var(--text);color:var(--bg);border:none;padding:18px 24px;font-family:var(--sans);font-size:13px;letter-spacing:0.32em;text-transform:uppercase;cursor:pointer;transition:opacity .15s;font-weight:600}
  .pd-add:hover{opacity:0.85}
  .pd-add:disabled{opacity:0.4;cursor:not-allowed}
  .pd-stock{margin-top:16px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold)}
  .pd-meta{margin-top:32px;padding-top:24px;border-top:1px solid #1f1f1f;display:flex;gap:32px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-3)}
  .pd-back{display:inline-block;margin-bottom:24px;color:var(--text-2);font-size:11px;letter-spacing:0.32em;text-transform:uppercase;text-decoration:none}
  .pd-back:hover{color:var(--text)}
  @media (max-width: 900px){
    .pd-wrap{grid-template-columns:1fr;gap:32px;padding:40px 20px}
    .pd-image{min-height:320px;padding:24px}
    .pd-info h1{font-size:28px}
  }
</style>
</head>
<body>
<div class="frame-top"></div><div class="frame-right"></div><div class="frame-bottom"></div><div class="frame-left"></div>

<nav class="nav"><div class="nav-inner">
  <a href="/" class="brand"><span class="brand-rule"></span><span class="label">PARALLEL<span class="dot">.</span></span><span class="brand-rule"></span></a>
  <div class="nav-links">
    <a href="/">Drops</a>
    <a href="/marketplace.html">Marketplace</a>
    <a href="/sell.html">Sell</a>
    <a href="/cart.html" style="position:relative">Bag <span data-cart-badge style="display:none;background:var(--pk-red);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px"></span></a>
    <a href="/account.html" id="nav-account" style="display:none">Account</a>
    <a href="/login.html" class="nav-cta" id="nav-login">Sign In</a>
  </div>
</div></nav>

<main class="pd-wrap" id="pd-root">
  <p>Loading product…</p>
</main>

<script src="/js/products.js"></script>
<script src="/js/cart.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const pid = params.get('id');
  const root = document.getElementById('pd-root');
  const product = (window.PARALLEL_PRODUCTS || {})[pid];

  if (!product){
    root.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:80px 0">Product not found. <a href="/" style="color:var(--gold)">Return to Drops</a></p>';
    return;
  }

  document.title = 'PARALLEL — ' + product.title;
  const savings = Math.round((1 - product.price / product.market) * 100);

  root.innerHTML = [
    '<div>',
    '  <a href="/" class="pd-back">← Back to Drops</a>',
    '  <div class="pd-image"><img src="' + product.image + '" alt="' + product.title + '"></div>',
    '</div>',
    '<div class="pd-info">',
    '  <div class="pd-tag">' + product.tag + '</div>',
    '  <h1>' + product.title + '</h1>',
    '  <div class="pd-price-row">',
    '    <span class="pd-price">$' + product.price.toFixed(2) + '</span>',
    '    <span class="pd-market">$' + product.market.toFixed(2) + '</span>',
    '    <span class="pd-savings">Save ' + savings + '%</span>',
    '  </div>',
    '  <p class="pd-desc">' + product.description + '</p>',
    '  <div class="pd-contents">',
    '    <h3>What\'s Inside</h3>',
    '    <ul>' + product.contents.map(function(c){return '<li>'+c+'</li>';}).join('') + '</ul>',
    '  </div>',
    '  <div class="pd-qty">',
    '    <label>Quantity</label>',
    '    <div class="pd-qty-control">',
    '      <button type="button" id="qty-minus" aria-label="Decrease">−</button>',
    '      <input type="number" id="qty-input" value="1" min="1" max="' + product.stock + '">',
    '      <button type="button" id="qty-plus" aria-label="Increase">+</button>',
    '    </div>',
    '  </div>',
    '  <div class="pd-actions">',
    '    <button class="pd-add" id="add-btn">Add to Bag</button>',
    '  </div>',
    '  <div class="pd-stock">● ' + product.stock + ' in stock — ships within 24 hours</div>',
    '  <div class="pd-meta">',
    '    <span>SKU: ' + product.sku + '</span>',
    '    <span>100% Sealed</span>',
    '    <span>Receipt Included</span>',
    '  </div>',
    '</div>'
  ].join('');

  const qtyInput = document.getElementById('qty-input');
  document.getElementById('qty-minus').addEventListener('click', function(){
    qtyInput.value = Math.max(1, parseInt(qtyInput.value, 10) - 1);
  });
  document.getElementById('qty-plus').addEventListener('click', function(){
    qtyInput.value = Math.min(product.stock, parseInt(qtyInput.value, 10) + 1);
  });
  document.getElementById('add-btn').addEventListener('click', function(){
    const q = Math.max(1, parseInt(qtyInput.value, 10) || 1);
    window.PARALLEL_CART.add(product.id, q);
  });
})();
</script>
</body>
</html>
